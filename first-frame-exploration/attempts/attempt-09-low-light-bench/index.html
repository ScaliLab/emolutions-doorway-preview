<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 09 - Low Light Bench</title>
  <style>
    :root {
      color-scheme: dark;
      --bench: #10100e;
      --steel: #242521;
      --paper: #ece2c9;
      --ink: #161514;
      --amber: #d89335;
      --green: #7cae82;
      --red: #b7503c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(216, 147, 53, .22), transparent 24%),
        linear-gradient(135deg, #10100e 0 42%, #1a1b18 42% 100%);
      color: var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      position: relative;
      min-height: 100vh;
      padding: clamp(18px, 5vw, 64px);
    }

    .bench {
      position: absolute;
      right: clamp(18px, 6vw, 84px);
      bottom: clamp(28px, 8vh, 88px);
      width: min(720px, 72vw);
      height: clamp(240px, 42vh, 380px);
      border: 1px solid rgba(236, 226, 201, .22);
      background:
        linear-gradient(90deg, rgba(236, 226, 201, .08), transparent 18% 82%, rgba(0, 0, 0, .28)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, .04) 0 1px, transparent 1px 18px),
        var(--steel);
      box-shadow: 0 28px 70px rgba(0, 0, 0, .46);
      transform: perspective(900px) rotateX(7deg) rotateZ(-1deg);
      transform-origin: bottom right;
    }

    .meter {
      position: absolute;
      left: clamp(18px, 7vw, 92px);
      top: clamp(28px, 13vh, 118px);
      display: grid;
      width: min(340px, 78vw);
      grid-template-columns: 74px 1fr;
      gap: 14px;
      color: rgba(236, 226, 201, .66);
      font-size: .78rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .meter span {
      opacity: 0;
      animation: meter-on 420ms ease forwards;
    }

    .meter span:nth-child(3),
    .meter span:nth-child(4) {
      animation-delay: 340ms;
    }

    .meter span:nth-child(5),
    .meter span:nth-child(6) {
      animation-delay: 680ms;
    }

    .readout {
      position: absolute;
      right: clamp(28px, 10vw, 152px);
      bottom: clamp(82px, 17vh, 150px);
      width: min(430px, 62vw);
      padding: 22px 24px 24px;
      border: 1px solid rgba(216, 147, 53, .72);
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 16px 32px rgba(0, 0, 0, .42);
      opacity: 0;
      transform: translateY(18px);
      animation: tag-lit 950ms cubic-bezier(.2, .8, .18, 1) 980ms forwards;
    }

    .readout::before {
      display: block;
      margin-bottom: 34px;
      color: var(--red);
      content: "observed pattern";
      font: 700 .68rem/1.1 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .primary {
      margin: 0;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      font-size: clamp(1.55rem, 3.3vw, 2.6rem);
      font-weight: 430;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .needle {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 38%;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--amber));
      transform: scaleX(.18);
      transform-origin: left;
      animation: needle-set 1400ms cubic-bezier(.18, .82, .2, 1) 1600ms forwards;
    }

    @keyframes meter-on {
      to {
        opacity: 1;
      }
    }

    @keyframes tag-lit {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes needle-set {
      to {
        transform: scaleX(1);
      }
    }

    @media (max-width: 660px) {
      .bench {
        right: -110px;
        bottom: 42px;
        width: 520px;
        height: 250px;
      }

      .meter {
        left: 20px;
        top: 34px;
        width: 270px;
        grid-template-columns: 60px 1fr;
        gap: 10px;
        font-size: .66rem;
      }

      .readout {
        left: 34px;
        right: auto;
        bottom: 154px;
        width: min(310px, calc(100vw - 68px));
      }

      .primary {
        font-size: clamp(1.45rem, 7vw, 2.05rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .meter span,
      .readout,
      .needle {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="meter" aria-hidden="true">
      <span>input</span><span>visible result</span>
      <span>force</span><span>increased</span>
      <span>change</span><span>not held</span>
    </div>
    <div class="bench" aria-hidden="true"></div>
    <section class="readout" aria-label="Observed pattern">
      <p class="primary">Most people try to change outcomes directly.</p>
      <div class="needle" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
