<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 22 - Friction Door</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f5ead8;
      --ground: #171312;
      --hold: #b95a42;
      --line: rgba(245, 234, 216, .14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, transparent 0 58%, rgba(185, 90, 66, .38) 58% calc(58% + 14px), transparent calc(58% + 14px)),
        linear-gradient(110deg, #281713, var(--ground) 58%);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    body::before,
    body::after {
      position: fixed;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
      content: "";
      pointer-events: none;
      transform: translateX(-18vw);
      animation: catch-line 1800ms cubic-bezier(.2, .8, .18, 1) forwards;
    }

    body::before {
      top: 31vh;
    }

    body::after {
      top: 67vh;
      animation-delay: 260ms;
    }

    main {
      position: relative;
      display: grid;
      min-height: 100vh;
      align-items: center;
      padding: clamp(24px, 7vw, 92px);
    }

    .primary {
      max-width: 12ch;
      margin: 0;
      font-size: clamp(3rem, 8.8vw, 8.8rem);
      font-weight: 430;
      line-height: .92;
      letter-spacing: 0;
      transform: translateX(-22px);
      animation: settle 1600ms cubic-bezier(.18, .82, .2, 1) 240ms forwards;
    }

    @keyframes catch-line {
      58% {
        transform: translateX(0);
      }

      72% {
        transform: translateX(-4vw);
      }

      100% {
        transform: translateX(0);
      }
    }

    @keyframes settle {
      45% {
        transform: translateX(26px);
      }

      68% {
        transform: translateX(-8px);
      }

      100% {
        transform: translateX(0);
      }
    }

    @media (max-width: 660px) {
      body {
        background:
          linear-gradient(90deg, transparent 0 74%, rgba(185, 90, 66, .36) 74% calc(74% + 10px), transparent calc(74% + 10px)),
          linear-gradient(110deg, #281713, var(--ground) 58%);
      }

      main {
        padding: 24px;
      }

      .primary {
        max-width: 9.8ch;
        font-size: clamp(3rem, 15.6vw, 5.8rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after,
      .primary {
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Friction door first frame">
    <h1 class="primary">Most people try to change outcomes directly.</h1>
  </main>
</body>
</html>
