<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 04 - Pressure Notation</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f4f2ed;
      --ink: #141413;
      --mark-a: rgba(27, 60, 56, .12);
      --mark-b: rgba(142, 94, 73, .16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(20, 20, 19, .08), transparent 13% 87%, rgba(20, 20, 19, .08)),
        var(--paper);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    .notation {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: clamp(5px, 1vw, 14px);
      padding: clamp(18px, 4vw, 44px);
      opacity: .92;
      pointer-events: none;
    }

    .notation span {
      min-width: 0;
      border-radius: 3px;
      background: linear-gradient(180deg, transparent, var(--mark-a) 16% 88%, transparent);
      transform: scaleY(.78);
      transform-origin: center;
      animation: release 2600ms cubic-bezier(.16, .8, .24, 1) 1500ms forwards;
    }

    .notation span:nth-child(2n) {
      background: linear-gradient(180deg, transparent, var(--mark-b) 20% 78%, transparent);
      animation-duration: 3100ms;
    }

    .notation span:nth-child(3n) {
      transform: scaleY(.62);
      animation-delay: 1750ms;
    }

    main {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: clamp(24px, 7vw, 84px);
    }

    h1 {
      width: min(15ch, 88vw);
      margin: 0;
      opacity: 0;
      filter: blur(3px);
      transform: translateY(8px) scale(.985);
      font-size: clamp(3rem, 9.4vw, 8.2rem);
      font-weight: 410;
      line-height: .94;
      letter-spacing: 0;
      animation: recognition 1800ms cubic-bezier(.18, .82, .2, 1) 680ms forwards;
    }

    @keyframes recognition {
      68% {
        filter: blur(0);
      }

      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) scale(1);
      }
    }

    @keyframes release {
      to {
        opacity: .55;
        transform: scaleY(1);
      }
    }

    @media (max-width: 620px) {
      .notation {
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        padding: 14px;
      }

      .notation span:nth-child(n+6) {
        display: none;
      }

      main {
        place-items: center start;
      }

      h1 {
        width: min(11ch, 92vw);
        font-size: clamp(3rem, 17vw, 5.8rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .notation span,
      h1 {
        opacity: 1;
        filter: none;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="notation" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
  <main>
    <h1>Most people try to change outcomes directly.</h1>
  </main>
</body>
</html>
