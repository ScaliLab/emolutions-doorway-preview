<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 28 - Available Unavailable</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #151514;
      --ground: #f2ede5;
      --closed: rgba(21, 21, 20, .18);
      --open: rgba(49, 95, 90, .28);
      --accent: #315f5a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--ground);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    .state {
      position: fixed;
      inset: clamp(18px, 5vw, 70px);
      border: 1px solid var(--closed);
      border-radius: 0;
      pointer-events: none;
      animation: state-opens 1800ms cubic-bezier(.2, .8, .18, 1) 1450ms forwards;
    }

    .state::before,
    .state::after {
      position: absolute;
      background: var(--closed);
      content: "";
      animation: bars-open 1600ms cubic-bezier(.2, .8, .18, 1) 1450ms forwards;
    }

    .state::before {
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
    }

    .state::after {
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
    }

    main {
      position: relative;
      display: grid;
      min-height: 100vh;
      align-items: center;
      padding: clamp(24px, 7vw, 92px);
    }

    .primary {
      max-width: 12.2ch;
      margin: 0;
      font-size: clamp(3rem, 8.8vw, 8.8rem);
      font-weight: 430;
      line-height: .92;
      letter-spacing: 0;
    }

    .bridge {
      margin: clamp(28px, 5vh, 52px) 0 0;
      color: var(--accent);
      font: clamp(1.35rem, 3vw, 2.35rem)/1.12 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      opacity: 0;
      transform: translateY(10px);
      animation: bridge-in 900ms cubic-bezier(.2, .8, .18, 1) 2650ms forwards;
    }

    @keyframes state-opens {
      to {
        border-color: var(--open);
        border-radius: 48px;
        transform: scale(.96);
      }
    }

    @keyframes bars-open {
      to {
        opacity: 0;
      }
    }

    @keyframes bridge-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 660px) {
      .state {
        inset: 16px;
      }

      main {
        padding: 24px;
      }

      .primary {
        max-width: 9.8ch;
        font-size: clamp(3rem, 15.6vw, 5.8rem);
      }

      .bridge {
        font-size: clamp(1.25rem, 7vw, 1.8rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .state,
      .state::before,
      .state::after,
      .bridge {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="state" aria-hidden="true"></div>
  <main aria-label="Available unavailable perceptual demonstration">
    <section>
      <h1 class="primary">Most people try to change outcomes directly.</h1>
      <p class="bridge">Emolutions works upstream.</p>
    </section>
  </main>
</body>
</html>
