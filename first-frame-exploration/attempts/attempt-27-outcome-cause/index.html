<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 27 - Outcome Visible Cause Hidden</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #151514;
      --ground: #f5f0e8;
      --outcome: #ca6348;
      --cause: #315f5a;
      --line: rgba(21, 21, 20, .14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--ground);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    .outcome {
      position: fixed;
      right: clamp(18px, 7vw, 90px);
      top: clamp(34px, 12vh, 120px);
      width: min(28vw, 320px);
      height: min(28vw, 320px);
      min-width: 130px;
      min-height: 130px;
      border-radius: 999px;
      background: var(--outcome);
      box-shadow: 0 20px 56px rgba(202, 99, 72, .24);
      pointer-events: none;
      animation: outcome-settles 1700ms cubic-bezier(.2, .8, .18, 1) 900ms forwards;
    }

    .cause {
      position: fixed;
      left: clamp(18px, 7vw, 92px);
      bottom: clamp(42px, 14vh, 140px);
      width: min(22vw, 240px);
      height: 1px;
      background: var(--cause);
      transform: scaleX(.08);
      transform-origin: left;
      opacity: 0;
      pointer-events: none;
      animation: cause-appears 1300ms cubic-bezier(.2, .8, .18, 1) 1850ms forwards;
    }

    .cause::after {
      position: absolute;
      right: -7px;
      top: -6px;
      width: 13px;
      height: 13px;
      border-radius: 999px;
      background: var(--cause);
      content: "";
    }

    main {
      position: relative;
      display: grid;
      min-height: 100vh;
      align-items: center;
      padding: clamp(24px, 7vw, 92px);
    }

    .primary {
      max-width: 12.4ch;
      margin: 0;
      font-size: clamp(3rem, 8.8vw, 8.8rem);
      font-weight: 430;
      line-height: .92;
      letter-spacing: 0;
    }

    .bridge {
      margin: clamp(28px, 5vh, 52px) 0 0;
      color: var(--cause);
      font: clamp(1.35rem, 3vw, 2.35rem)/1.12 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      opacity: 0;
      transform: translateY(10px);
      animation: bridge-in 900ms cubic-bezier(.2, .8, .18, 1) 2650ms forwards;
    }

    @keyframes outcome-settles {
      to {
        transform: translate(-22px, 22px) scale(.92);
        opacity: .58;
      }
    }

    @keyframes cause-appears {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes bridge-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 660px) {
      main {
        padding: 24px;
      }

      .primary {
        max-width: 9.8ch;
        font-size: clamp(3rem, 15.6vw, 5.8rem);
      }

      .bridge {
        font-size: clamp(1.25rem, 7vw, 1.8rem);
      }

      .outcome {
        right: -42px;
        top: 70px;
      }

      .cause {
        bottom: 98px;
        width: 44vw;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .outcome,
      .cause,
      .bridge {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="outcome" aria-hidden="true"></div>
  <div class="cause" aria-hidden="true"></div>
  <main aria-label="Outcome visible cause hidden perceptual demonstration">
    <section>
      <h1 class="primary">Most people try to change outcomes directly.</h1>
      <p class="bridge">Emolutions works upstream.</p>
    </section>
  </main>
</body>
</html>
