<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 20 - Conversation Turn</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #151514;
      --muted: #625a52;
      --ground: #f6f1e8;
      --warm: #c45f47;
      --line: rgba(21, 21, 20, .16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, var(--warm) 0 24vw, transparent 24vw),
        var(--ground);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    main {
      display: grid;
      min-height: 100vh;
      grid-template-columns: minmax(160px, 24vw) minmax(0, 1fr);
    }

    .side {
      display: flex;
      align-items: flex-end;
      padding: clamp(20px, 4vw, 52px);
      color: rgba(255, 248, 238, .86);
      font: .9rem/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .copy {
      display: grid;
      align-content: center;
      padding: clamp(24px, 7vw, 92px);
    }

    .before {
      max-width: 31rem;
      margin: 0 0 clamp(34px, 7vh, 72px);
      color: var(--muted);
      font: clamp(1.08rem, 2.1vw, 1.45rem)/1.42 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .primary {
      max-width: 13.2ch;
      margin: 0;
      padding-top: clamp(28px, 5vh, 46px);
      border-top: 1px solid var(--line);
      font-size: clamp(3rem, 8.4vw, 8.6rem);
      font-weight: 430;
      line-height: .92;
      letter-spacing: 0;
    }

    .after {
      max-width: 23rem;
      margin: clamp(30px, 6vh, 56px) 0 0;
      color: var(--muted);
      font: 1rem/1.55 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (max-width: 720px) {
      body {
        background:
          linear-gradient(180deg, var(--warm) 0 88px, transparent 88px),
          var(--ground);
      }

      main {
        grid-template-columns: 1fr;
      }

      .side {
        min-height: 88px;
        align-items: center;
        padding: 18px 22px;
      }

      .copy {
        align-content: start;
        padding: 54px 24px 30px;
      }

      .before {
        margin-bottom: 52px;
      }

      .primary {
        max-width: 9.8ch;
        font-size: clamp(3rem, 15.5vw, 5.8rem);
      }
    }
  </style>
</head>
<body>
  <main>
    <aside class="side">First, the familiar part.</aside>
    <section class="copy" aria-label="Conversation turn recognition">
      <p class="before">You try to fix the visible thing. Then the visible thing asks for fixing again.</p>
      <h1 class="primary">Most people try to change outcomes directly.</h1>
      <p class="after">Recognition first. Explanation can wait.</p>
    </section>
  </main>
</body>
</html>
