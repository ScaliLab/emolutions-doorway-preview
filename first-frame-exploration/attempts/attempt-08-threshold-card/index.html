<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 08 - Threshold Card</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f5f2ea;
      --ink: #151514;
      --shadow: rgba(21, 21, 20, .14);
      --edge: #cfc5b6;
      --card: #fffdf7;
      --accent: #315f5a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, #ebe4d7 0 28%, transparent 28%),
        var(--paper);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    main {
      position: relative;
      min-height: 100vh;
      padding: clamp(18px, 5vw, 64px);
    }

    .threshold {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 28%;
      width: 1px;
      background: var(--edge);
      box-shadow: 18px 0 34px rgba(21, 21, 20, .05);
    }

    .card {
      position: absolute;
      left: min(38vw, 520px);
      top: clamp(104px, 31vh, 260px);
      width: min(390px, calc(100vw - 40px));
      min-height: 210px;
      padding: 26px 28px;
      border: 1px solid rgba(207, 197, 182, .9);
      border-radius: 4px;
      background: var(--card);
      box-shadow: 0 18px 46px var(--shadow);
      opacity: 0;
      transform: translateX(-28px) rotate(-1deg);
      animation: card-placed 1000ms cubic-bezier(.2, .8, .18, 1) 420ms forwards;
    }

    .pin {
      width: 2.8rem;
      height: 1px;
      margin-bottom: 46px;
      background: var(--accent);
      opacity: .9;
      transform: scaleX(.35);
      transform-origin: left;
      animation: pin-opens 800ms cubic-bezier(.2, .8, .18, 1) 1250ms forwards;
    }

    .primary {
      margin: 0;
      opacity: 0;
      transform: translateY(8px);
      font-size: clamp(1.45rem, 3vw, 2.15rem);
      font-weight: 430;
      line-height: 1.14;
      letter-spacing: 0;
      animation: line-settles 1100ms cubic-bezier(.2, .8, .18, 1) 1450ms forwards;
    }

    .quiet {
      position: absolute;
      left: clamp(20px, 7vw, 96px);
      bottom: clamp(24px, 8vh, 88px);
      max-width: 11rem;
      color: rgba(21, 21, 20, .34);
      font: .78rem/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      opacity: 0;
      animation: quiet-in 900ms ease 2300ms forwards;
    }

    @keyframes card-placed {
      to {
        opacity: 1;
        transform: translateX(0) rotate(-1deg);
      }
    }

    @keyframes pin-opens {
      to {
        transform: scaleX(1);
      }
    }

    @keyframes line-settles {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes quiet-in {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 660px) {
      body {
        background:
          linear-gradient(90deg, #ebe4d7 0 62px, transparent 62px),
          var(--paper);
      }

      main {
        padding: 18px;
      }

      .threshold {
        left: 62px;
      }

      .card {
        left: 88px;
        top: 138px;
        width: calc(100vw - 110px);
        min-height: 250px;
        padding: 24px 22px;
      }

      .primary {
        font-size: clamp(1.45rem, 7vw, 2rem);
      }

      .quiet {
        left: 88px;
        right: 20px;
        bottom: 48px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .pin,
      .primary,
      .quiet {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="threshold" aria-hidden="true"></div>
    <article class="card" aria-label="First recognition threshold card">
      <div class="pin" aria-hidden="true"></div>
      <p class="primary">Most people try to change outcomes directly.</p>
    </article>
    <p class="quiet">left at the edge.</p>
  </main>
</body>
</html>
