<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 14 - Plain Spoken</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111110;
      --ground: #f2c546;
      --deep: #7e2d2a;
      --soft: rgba(17, 17, 16, .18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(126, 45, 42, .88) 0 19%, transparent 19%),
        var(--ground);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }

    main {
      display: grid;
      min-height: 100vh;
      align-items: end;
      padding: clamp(24px, 6vw, 78px);
    }

    .copy {
      width: min(980px, 100%);
      padding-bottom: clamp(28px, 7vh, 76px);
    }

    .lead {
      margin: 0 0 clamp(26px, 6vh, 64px);
      color: rgba(255, 246, 220, .84);
      font: .96rem/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      opacity: 0;
      animation: lead-in 600ms ease 260ms forwards;
    }

    .primary {
      max-width: 12.8ch;
      margin: 0;
      font-size: clamp(3.3rem, 10.4vw, 9.5rem);
      font-weight: 430;
      line-height: .9;
      letter-spacing: 0;
    }

    .primary span {
      display: inline;
      opacity: 0;
      filter: blur(5px);
      animation: spoken 620ms cubic-bezier(.2, .8, .18, 1) forwards;
    }

    .primary span:nth-child(2) {
      animation-delay: 360ms;
    }

    .primary span:nth-child(3) {
      animation-delay: 720ms;
    }

    .primary span:nth-child(4) {
      animation-delay: 1080ms;
    }

    .primary span:nth-child(5) {
      animation-delay: 1440ms;
    }

    .underline {
      width: min(17rem, 62vw);
      height: 8px;
      margin-top: clamp(28px, 5vh, 48px);
      background: var(--deep);
      transform: scaleX(0);
      transform-origin: left;
      animation: escort 900ms cubic-bezier(.2, .8, .18, 1) 1900ms forwards;
    }

    @keyframes lead-in {
      to {
        opacity: 1;
      }
    }

    @keyframes spoken {
      to {
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes escort {
      to {
        transform: scaleX(1);
      }
    }

    @media (max-width: 640px) {
      main {
        padding: 24px 22px;
      }

      .copy {
        padding-bottom: 48px;
      }

      .lead {
        color: rgba(255, 246, 220, .9);
      }

      .primary {
        max-width: 9.6ch;
        font-size: clamp(3rem, 16.6vw, 6rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .lead,
      .primary span {
        opacity: 1;
        filter: none;
        animation: none;
      }

      .underline {
        transform: scaleX(1);
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="copy" aria-label="Plain spoken first line">
      <p class="lead">You may already know this.</p>
      <h1 class="primary">
        <span>Most people</span>
        <span>try to</span>
        <span>change</span>
        <span>outcomes</span>
        <span>directly.</span>
      </h1>
      <div class="underline" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
