<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt 18 - Familiar Move Choice</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f5ead8;
      --muted: rgba(245, 234, 216, .68);
      --ground: #14110f;
      --panel: #211b18;
      --line: rgba(245, 234, 216, .18);
      --accent: #d88f45;
      --active: #f5ead8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--ground);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      min-height: 100vh;
      grid-template-columns: minmax(300px, .8fr) minmax(420px, 1.2fr);
      gap: clamp(24px, 6vw, 88px);
      align-items: center;
      padding: clamp(22px, 6vw, 84px);
    }

    .choice {
      display: grid;
      gap: 12px;
    }

    .choice p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    label {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.25;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    label:hover,
    input:focus-visible + label,
    input:checked + label {
      border-color: var(--accent);
      background: rgba(216, 143, 69, .16);
      color: var(--active);
    }

    .primary-area {
      border-left: 1px solid var(--line);
      padding-left: clamp(28px, 5vw, 74px);
    }

    .primary {
      max-width: 12ch;
      margin: 0;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 8.4vw, 8.8rem);
      font-weight: 430;
      line-height: .92;
      letter-spacing: 0;
    }

    .note {
      max-width: 22rem;
      margin: clamp(26px, 5vh, 48px) 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    @media (max-width: 780px) {
      body {
        overflow: auto;
      }

      main {
        min-height: 100vh;
        grid-template-columns: 1fr;
        gap: 34px;
        align-items: start;
        padding: 28px 20px 44px;
      }

      .choice {
        order: 2;
      }

      .primary-area {
        order: 1;
        border-left: 0;
        padding-left: 0;
      }

      .primary {
        max-width: 9.8ch;
        font-size: clamp(3rem, 15.8vw, 5.8rem);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="choice" aria-label="Familiar moves">
      <p>Which one feels familiar first?</p>
      <div>
        <input id="move-a" name="move" type="radio">
        <label for="move-a">Fix the visible result.</label>
      </div>
      <div>
        <input id="move-b" name="move" type="radio">
        <label for="move-b">Push the decision harder.</label>
      </div>
      <div>
        <input id="move-c" name="move" type="radio">
        <label for="move-c">Try to make the ending obey.</label>
      </div>
    </section>
    <section class="primary-area" aria-label="First recognition">
      <h1 class="primary">Most people try to change outcomes directly.</h1>
      <p class="note">The choice is optional. The pattern is already there.</p>
    </section>
  </main>
</body>
</html>
